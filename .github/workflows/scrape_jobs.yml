name: 24/7 Automated Job Scraper

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Scraper Dependencies
        run: |
          pip install requests

      - name: Run Job Scraper Script
        run: |
          python job_scraper.py
        env:
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}

      - name: Commit and Push Updated Cache
        run: |
          git config --global user.name "SAdmin Job Scraper"
          git config --global user.email "scraper@prepos.ai"
          git add jobs_cache.json abroad_cache.json
          git commit -m "Auto-update jobs cache feed: $(date)" || echo "No changes to commit"
          git push origin main || echo "No changes to push"
